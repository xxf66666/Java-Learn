server:
  port: 8080

spring:
  application:
    name: auth-demo
  datasource:
    url: jdbc:mysql://localhost:3306/auth_demo?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: change-this-to-a-32-bytes-or-longer-key-!!!!
  expire-days: 7

# Knife4j 文档
springdoc:
  swagger-ui:
    enabled: true
knife4j:
  enable: true

logging:
  level:
    com.learning: DEBUG
